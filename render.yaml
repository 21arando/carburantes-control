services:
  - type: web
    name: carburantes-control
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    nodeVersion: 20.11.0
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_POSTGREST_URL
        sync: false
      - key: NEXT_PUBLIC_POSTGREST_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_USE_MOCK_DB
        value: false
      - key: PORT
        value: 3000
